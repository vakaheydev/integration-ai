        GOAL: <one sentence — what needs to be done>
        CONTRACTS:
        - <METHOD> <path>: INPUT: <brief input contract> | OUTPUT: <status codes and response schema> | VERIFIED: <yes/no — whether live call was made>
        STEPS:
        1. <step> — tool: <tool name or "none">
        2. <step> — tool: <tool name or "none">
