prompts:
  roles:
    analyst: |
      SYSTEM: You are the best expert system analyst.

    programmer: |
      SYSTEM: You are the best expert developer and code architect.

  outputs:
    text: |
      STRICT OUTPUT RULES:
      1) Do NOT include markdown, code fences, comments, or explanations.
      2) The answer MUST be a plain string.

    yes-no: |
      STRICT OUTPUT RULES:
      1) Do NOT include markdown, code fences, comments, or explanations.
      2) The answer MUST be a single word: "yes" or "no".

    analysis-plan: |
      STRICT OUTPUT RULES:
      1) Each step must be specific and actionable.
      2) Do NOT include markdown, code fences, comments, or prose outside the format above.
      3) The answer MUST follow the output format exactly (GOAL, CONTRACTS, STEPS, EXPECTED RESULT).
      4) Do NOT include any code or code snippets in the plan. Steps must describe WHAT to do, not HOW to implement it in code.
      5) The CONTRACTS section is REQUIRED. If no API endpoints are involved, write "CONTRACTS: none".

    code: |
      STRICT OUTPUT RULES:
      1) Return ONLY the code. Do NOT include the plan, step numbers, tool names, or any meta-information.
      2) The code MUST be wrapped between <<<CODE_START language=python>>> and <<<CODE_END>>>.
      3) Follow PEP8; use functions, docstrings and SOLID principles.
      4) For API base URL, use the server address from the Swagger document (SERVERS block) unless the user explicitly specifies a different address.

    test: |
      STRICT OUTPUT RULES:
      1) Return ONLY the test code. Do NOT include the plan, step numbers, tool names, or any meta-information.
      2) The code MUST be wrapped between <<<CODE_START language=python>>> and <<<CODE_END>>>.
      3) Follow PEP8; use pytest as the test framework.
      4) Each test function must have a descriptive name starting with "test_".
      5) Include assertions that verify HTTP status codes and response structure.
      6) For API base URL, use the server address from the Swagger document (SERVERS block) unless the user explicitly specifies a different address.

    analysis-result: |
      STRICT OUTPUT RULES:
      1) Return only the final result of the task execution as a structured textual analysis.
      2) Do NOT include the plan, step numbers, tool names, or any meta-information.
      3) Do NOT include markdown, code fences, or explanations.
      4) Do NOT write any code (no Python, no JavaScript, no code snippets of any kind). Your output must be purely analytical text.
      5) If the task asks you to write code — do NOT write code. Instead, describe what the code should do, which endpoints to use, what parameters to pass, and what the expected behavior is.

  actions:
    handle-task:
      review-task-result: |
        <<<TASK_DESCRIPTION>>>
        ${taskDescription}
        <<<END_TASK_DESCRIPTION>>>

        <<<TASK_RESULT>>>
        ${taskResult}
        <<<END_TASK_RESULT>>>

        <<<TASK_STATUS>>>
        ${taskStatus}
        <<<END_TASK_STATUS>>>

        Review the task result and the task status.
        If the task is not completed successfully, explain what went wrong and what can be done to fix it. 
        If the task is completed successfully, then answer so.
        Answer on language of task_description.

        ${outputRules.text}
      review-previous-result: |
        <<<TASK_DESCRIPTION>>>
        ${taskDescription}
        <<<END_TASK_DESCRIPTION>>>

        <<<PREVIOUS_RESULT>>>
        ${previousResult}
        <<<END_PREVIOUS_RESULT>>>

        <<<USER_FEEDBACK>>>
        ${userMessage}
        <<<END_USER_FEEDBACK>>>

        This task was previously completed, but the user was not satisfied with the result and restarted it.
        Analyze the PREVIOUS_RESULT and the USER_FEEDBACK carefully.
        Produce a detailed list of what must be fixed or improved in the next attempt.
        Be specific: reference exact parts of the previous result that need changes.
        Answer on language of task_description.

        ${outputRules.text}
      analyze-task: |
        <<<TASK_DESCRIPTION>>>
        ${taskDescription}
        <<<END_TASK_DESCRIPTION>>>

        <<<DOCUMENT_ID>>>
        ${documentId}
        <<<END_DOCUMENT_ID>>>
        
        <<<SWAGGER_SUMMARY>>>
        ${swaggerSummary}
        <<<END_SWAGGER_SUMMARY>>>

        <<<SWAGGER_METHODS>>>
        ${swaggerMethodSummary}
        <<<END_SWAGGER_METHODS>>>

        <<<AVAILABLE_TOOLS>>>
        ${availableTools}
        <<<END_AVAILABLE_TOOLS>>>

        ${restartContext}
        ${chainContext}
        Analyze the task and produce a short execution plan for another AI that will perform it.
        Use only tools listed in AVAILABLE_TOOLS. If no tool is needed for a step, write "none".
        The plan must be concise and actionable — no explanations, no reasoning, no fluff.
        IMPORTANT: The AI that will execute this plan has NO access to the document context. All necessary details (paths, method names, field names, document IDs) MUST be explicitly included in the plan steps.
        Answer on language of task_description.

        CONTRACT ANALYSIS: For each API endpoint relevant to the task, identify and include its contract:
        - INPUT CONTRACT: required/optional parameters, headers, request body schema (field names and types)
        - OUTPUT CONTRACT: expected HTTP status codes and response body schema (field names and types)
        Use getSwaggerMethod and getSwaggerSchema tools to retrieve exact contract details from the document.
        If a server base URL is available in the document and the task requires verifying live behavior, use executeGet/executePost/executePut/executeDelete/executePatch tools to call the API and confirm the actual response status and structure matches the contract.
        Include verified contract information explicitly in the plan steps so the executing AI has all details.

        CLARIFICATION: If the task description is too vague, ambiguous, or missing critical information to produce a meaningful plan, you MUST ask the user for clarification instead of guessing. To do this, respond ONLY with:
        <<<NEED_USER_INPUT>>>your specific question to the user (on language of task_description)<<<END_NEED_USER_INPUT>>>
        Do NOT combine this with a plan — either ask a question OR produce a plan, never both.

