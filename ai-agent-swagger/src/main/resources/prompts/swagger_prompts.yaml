prompts:
  roles:
    analyst: |
      SYSTEM: You are the best expert system analyst.

    programmer: |
      SYSTEM: You are the best expert developer and code architect.

  actions:
    handle-task:
      review-task-result: |
        <<<TASK_DESCRIPTION>>>
        ${taskDescription}
        <<<END_TASK_DESCRIPTION>>>

        <<<TASK_RESULT>>>
        ${taskResult}
        <<<END_TASK_RESULT>>>
        
        <<<TASK_STATUS>>>
        ${taskStatus}
        <<<END_TASK_STATUS>>>

        Review the provided result of the task based on task_description, task_result and task_status.
        Explain to user if the task is completed successfully or not.
        If the task is not completed successfully, explain what went wrong and what can be done to fix it. 
        If the task is completed successfully, then answer so.
        Answer on language of task_description.

        STRICT OUTPUT RULES:
        1) Do NOT include markdown, code fences, comments, or explanations.
        2) The answer MUST be a string.
      analyze-task: |
        <<<TASK_DESCRIPTION>>>
        ${taskDescription}
        <<<END_TASK_DESCRIPTION>>>

        <<<DOCUMENT_ID>>>
        ${documentId}
        <<<END_DOCUMENT_ID>>>
        
        <<<SWAGGER_SUMMARY>>>
        ${swaggerSummary}
        <<<END_SWAGGER_SUMMARY>>>

        <<<SWAGGER_METHODS>>>
        ${swaggerMethodSummary}
        <<<END_SWAGGER_METHODS>>>

        <<<AVAILABLE_TOOLS>>>
        ${availableTools}
        <<<END_AVAILABLE_TOOLS>>>

        Analyze the task and produce a short execution plan for another AI that will perform it.
        Use only tools listed in AVAILABLE_TOOLS. If no tool is needed for a step, write "none".
        The plan must be concise and actionable — no explanations, no reasoning, no fluff.
        Answer on language of task_description.

        Output format (strictly follow this structure):
        GOAL: <one sentence — what needs to be done>
        STEPS:
        1. <step> — tool: <tool name or "none">
        2. <step> — tool: <tool name or "none">
        ...
        EXPECTED RESULT: <one sentence — what the result should look like>

        STRICT OUTPUT RULES:
        1) Each step must be specific and actionable.
        2) Do NOT include markdown, code fences, comments, or prose outside the format above.
        3) The answer MUST follow the output format exactly.
      retry-analyze-task: |
        <<<TASK_DESCRIPTION>>>
        ${taskDescription}
        <<<END_TASK_DESCRIPTION>>>

        <<<DOCUMENT_ID>>>
        ${documentId}
        <<<END_DOCUMENT_ID>>>
        
        <<<SWAGGER_SUMMARY>>>
        ${swaggerSummary}
        <<<END_SWAGGER_SUMMARY>>>

