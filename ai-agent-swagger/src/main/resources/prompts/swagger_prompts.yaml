        EXPECTED RESULT: <one sentence — what the result should look like>

        STRICT OUTPUT RULES:
        1) Each step must be specific and actionable.
        2) Do NOT include markdown, code fences, comments, or prose outside the format above.
        3) The answer MUST follow the output format exactly.
      review-task-analysis: |
        <<<TASK_DESCRIPTION>>>
        ${taskDescription}
        <<<END_TASK_DESCRIPTION>>>
        
        <<<ANALYSIS>>>
        ${analysis}
        <<<END_ANALYSIS>>>

        Review the provided analysis (execution plan) for the task described in task_description.  
        If you find any mistakes, inaccuracies, or missing information, explain why.  
        If you think that something important is missing, specify what information is needed to complete the analysis.
        If the analysis is already perfect, then answer so.

        STRICT OUTPUT RULES:
        1) Do NOT include markdown, code fences, comments, or explanations.
        2) The answer MUST be a string.
      review-task-analysis-solution: |
        <<<REVIEW_FEEDBACK>>>
        ${review}
        <<<REVIEW_FEEDBACK>>>

        Based on REVIEW_FEEDBACK, decide if the analysis needs to be redone.
        If the analysis was completed successfully — answer "yes".
        If the analysis failed, is incomplete, or needs to be redone — answer "no".

        STRICT OUTPUT RULES:
        1) Do NOT include markdown, code fences, comments, or explanations.
        2) The answer MUST be a single word: "yes" or "no".

        STRICT OUTPUT RULES:
        1) Do NOT include markdown, code fences, comments, or explanations.
        2) The answer MUST be a string with one word - "yes" or "no".
      handle-task-analysis: |
