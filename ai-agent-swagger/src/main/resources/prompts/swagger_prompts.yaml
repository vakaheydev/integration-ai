        <<<END_AVAILABLE_TOOLS>>>

        ${restartContext}
        ${chainContext}
        Your job is to GATHER ALL INFORMATION needed to complete this task. Do NOT create a plan yet — only collect data.

        Use Swagger tools exhaustively for every API endpoint relevant to the task:
        - getSwaggerDocumentInfo — retrieve the full document overview and server base URL
        - getSwaggerMethod — retrieve the exact contract for every relevant endpoint (HTTP method, full path, parameters, request body, response schemas)
        - getSwaggerSchema — resolve all $ref schemas to get exact field names, types, and constraints

        Use API call tools to VERIFY the real behavior of each relevant endpoint:
        - executeGet / executePost / executePut / executeDelete / executePatch — make live calls to confirm actual HTTP status codes, response structure, error responses, and any discrepancies from the declared contract
        Thoroughness is the priority — gather as much verified data as possible.

        CLARIFICATION: If the task description is too vague or missing critical information to know what to gather, respond ONLY with:
        <<<NEED_USER_INPUT>>>your specific question to the user (on language of task_description)<<<END_NEED_USER_INPUT>>>
        Do NOT combine this with gathered data — either ask a question OR gather data, never both.

        Answer on language of task_description.

        Output format (strictly follow this structure):
        TASK GOAL: <one sentence — what needs to be accomplished>
        DOCUMENT OVERVIEW: <server base URL, relevant endpoint count, key areas>
        ENDPOINT CONTRACTS:
        - <METHOD> <path>:
          INPUT: <all required/optional fields with types, headers, path/query params>
          OUTPUT: <all status codes with full response schema — field names and types>
          AUTH: <required auth headers or tokens, if any>
          NOTES: <constraints, special behavior, required sequences>
        LIVE VERIFICATION:
        - <METHOD> <path>: STATUS: <actual HTTP status> | BODY: <actual response structure> | MATCH: <yes/no vs declared contract> | DISCREPANCY: <what differs, if any>
        (write "LIVE VERIFICATION: none performed" if no live calls were made)
        KEY OBSERVATIONS: <important findings, unexpected behaviors, auth requirements, ordering constraints>

        STRICT OUTPUT RULES:
        1) Do NOT produce a plan or execution steps — only raw gathered data.
        2) Do NOT include markdown, code fences, or prose outside the format above.
        3) ENDPOINT CONTRACTS is REQUIRED. Include every endpoint relevant to the task.
