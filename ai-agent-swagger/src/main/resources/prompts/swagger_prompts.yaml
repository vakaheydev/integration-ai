        ${feedback}
        <<<END_ANALYSIS_FEEDBACK>>>

        <<<AVAILABLE_TOOLS>>>
        ${availableTools}
        <<<END_AVAILABLE_TOOLS>>>

        Your previous execution plan was rejected. ANALYSIS_FEEDBACK explains what was wrong.
        Produce a corrected short execution plan for another AI that will perform the task.
        Use only tools listed in AVAILABLE_TOOLS. If no tool is needed for a step, write "none".
